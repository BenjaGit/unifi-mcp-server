services:
  # UniFi MCP Server
  unifi-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unifi-mcp-server
    restart: unless-stopped
    ports:
      - "${FASTMCP_PORT:-3000}:${FASTMCP_PORT:-3000}"
    environment:
      # UniFi API Configuration
      UNIFI_LOCAL_API_KEY: ${UNIFI_LOCAL_API_KEY:-}
      UNIFI_REMOTE_API_KEY: ${UNIFI_REMOTE_API_KEY:-}
      UNIFI_API_TYPE: ${UNIFI_API_TYPE:-cloud-v1}
      UNIFI_CLOUD_API_URL: ${UNIFI_CLOUD_API_URL:-https://api.ui.com}
      UNIFI_LOCAL_HOST: ${UNIFI_LOCAL_HOST:-}
      UNIFI_LOCAL_PORT: ${UNIFI_LOCAL_PORT:-443}
      UNIFI_LOCAL_VERIFY_SSL: ${UNIFI_LOCAL_VERIFY_SSL:-false}
      UNIFI_DEFAULT_SITE: ${UNIFI_DEFAULT_SITE:-default}

      # FastMCP transport (recommended for Docker)
      FASTMCP_TRANSPORT: ${FASTMCP_TRANSPORT:-streamable-http}
      FASTMCP_HOST: ${FASTMCP_HOST:-0.0.0.0}
      FASTMCP_PORT: ${FASTMCP_PORT:-3000}
      FASTMCP_STREAMABLE_HTTP_PATH: ${FASTMCP_STREAMABLE_HTTP_PATH:-/mcp}
      FASTMCP_SHOW_SERVER_BANNER: ${FASTMCP_SHOW_SERVER_BANNER:-false}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Optional: Rate Limiting
      UNIFI_RATE_LIMIT_REQUESTS: ${UNIFI_RATE_LIMIT_REQUESTS:-100}
      UNIFI_RATE_LIMIT_PERIOD: ${UNIFI_RATE_LIMIT_PERIOD:-60}
      UNIFI_REQUEST_TIMEOUT: ${UNIFI_REQUEST_TIMEOUT:-30}
      UNIFI_MAX_RETRIES: ${UNIFI_MAX_RETRIES:-3}
      UNIFI_RETRY_BACKOFF_FACTOR: ${UNIFI_RETRY_BACKOFF_FACTOR:-2.0}

      # Optional: Cache and audit behavior
      UNIFI_CACHE_ENABLED: ${UNIFI_CACHE_ENABLED:-true}
      UNIFI_CACHE_TTL: ${UNIFI_CACHE_TTL:-300}
      UNIFI_AUDIT_LOG_ENABLED: ${UNIFI_AUDIT_LOG_ENABLED:-true}

      # Optional: Agnost Performance Tracking
      AGNOST_ENABLED: ${AGNOST_ENABLED:-false}
      AGNOST_ORG_ID: ${AGNOST_ORG_ID:-}
      AGNOST_ENDPOINT: ${AGNOST_ENDPOINT:-https://api.agnost.ai}
      AGNOST_DISABLE_INPUT: ${AGNOST_DISABLE_INPUT:-false}
      AGNOST_DISABLE_OUTPUT: ${AGNOST_DISABLE_OUTPUT:-false}

      # Optional: Redis Caching
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Optional: Webhook Support
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    networks:
      - mcp-network
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./audit.log:/app/audit.log
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,socket; s=socket.create_connection(('127.0.0.1', int(os.getenv('FASTMCP_PORT', '3000'))), 2); s.close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MCP Toolbox - Analytics and Monitoring Dashboard
  mcp-toolbox:
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:${TOOLBOX_VERSION:-0.14.0}
    container_name: mcp-toolbox
    restart: unless-stopped
    profiles: ["toolbox"]
    ports:
      - "${TOOLBOX_PORT:-8080}:8080"
    command:
      - "--tools-file"
      - "/app/tools.yaml"
      - "--telemetry-otlp"
      - "https://api.agnost.ai/v1/otel/${AGNOST_ORG_ID}"
      - "--telemetry-service-name"
      - "${TOOLBOX_SERVICE_NAME:-unifi-mcp-toolbox}"
    volumes:
      - ./tools.yaml:/app/tools.yaml:ro
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis Cache (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: unifi-mcp-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -ec
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}" --maxmemory 256mb --maxmemory-policy allkeys-lru
        else
          exec redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
        fi
    volumes:
      - redis-data:/data
    networks:
      - mcp-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a \"$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  mcp-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
